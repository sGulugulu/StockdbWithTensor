data:
  path: ../data/sample_a_share_factors.csv
  format: wide
  stock_column: stock_code
  date_column: trade_date
  industry_column: industry
  return_column: future_return
  factor_columns:
    - value_factor
    - momentum_factor
    - quality_factor
    - volatility_factor

preprocess:
  max_missing_ratio: 0.45
  winsor_limits: [0.05, 0.95]

models:
  seed: 7
  cp:
    enabled: true
    ranks: [2, 3]
    max_iter: 75
    tol: 1.0e-6
  tucker:
    enabled: true
    ranks:
      - [2, 2, 2]
      - [3, 2, 2]
    max_iter: 20
    tol: 1.0e-6
  pca:
    enabled: true
    ranks: [2, 3]

evaluation:
  top_k_pairs: 5
  rolling_window: 3

output:
  root_dir: ../outputs
  experiment_name: sample_run
