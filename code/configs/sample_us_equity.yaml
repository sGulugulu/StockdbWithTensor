market:
  market_id: us_equity
  universe_id: SAMPLE_US
  start_date: 2026-01-01
  end_date: 2026-12-31
  timezone: America/New_York
  currency: USD
  universe_path:

data:
  path: ../data/sample_us_equity_factors.csv
  format: wide
  stock_column: stock_code
  date_column: trade_date
  industry_column: industry
  return_column: future_return
  factor_columns:
    - value_factor
    - momentum_factor
    - quality_factor
    - volatility_factor

preprocess:
  max_missing_ratio: 0.45
  winsor_limits: [0.05, 0.95]

models:
  seed: 11
  cp:
    enabled: true
    ranks: [2]
    max_iter: 50
    tol: 1.0e-6
  tucker:
    enabled: true
    ranks:
      - [2, 2, 2]
    max_iter: 15
    tol: 1.0e-6
  pca:
    enabled: true
    ranks: [2]

evaluation:
  top_k_pairs: 3
  rolling_window: 3

output:
  root_dir: ../outputs
  experiment_name: sample_us_run
